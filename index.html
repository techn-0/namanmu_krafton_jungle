<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion Recognition with MediaPipe</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <video id="input_video" style="display:none;"></video>
    <canvas id="output_canvas" width="640" height="480"></canvas>
    <div id="count_display" style="position: absolute; top: 20px; left: 20px; font-size: 30px; color: red;">Squat Count: 0</div>
    <div id="instruction_display" style="position: absolute; top: 60px; left: 20px; font-size: 20px; color: blue;">
    Squat when knee angle is less than 90 degrees, stand when above 160 degrees.
    </div>
    <button id="start_button">Start</button>
    <button id="stop_button">Stop</button>
    <br><br><script src="./dist/bundle.js"></script>

</body>
</html>
